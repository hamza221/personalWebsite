<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- steam -->
  <rect x="11" y="3"  width="2" height="2" fill="#808080"/>
  <rect x="12" y="5"  width="2" height="2" fill="#808080"/>
  <rect x="11" y="7"  width="2" height="2" fill="#808080"/>
  <rect x="18" y="3"  width="2" height="2" fill="#808080"/>
  <rect x="19" y="5"  width="2" height="2" fill="#808080"/>
  <rect x="18" y="7"  width="2" height="2" fill="#808080"/>

  <!-- cup body -->
  <rect x="5" y="12" width="18" height="14" fill="#fffde7" stroke="#404040" stroke-width="1"/>

  <!-- coffee surface -->
  <rect x="6" y="13" width="16" height="3" fill="#000"/>

  <!-- handle -->
  <rect x="23" y="14" width="5" height="2" fill="#fffde7" stroke="#404040" stroke-width="1"/>
  <rect x="26" y="16" width="2" height="4" fill="#fffde7" stroke="#404040" stroke-width="1"/>
  <rect x="23" y="20" width="5" height="2" fill="#fffde7" stroke="#404040" stroke-width="1"/>

  <!-- cup base shading -->
  <rect x="6" y="24" width="16" height="2" fill="#808080"/>

  <!-- saucer -->
  <rect x="3" y="27" width="22" height="2" fill="#fffde7" stroke="#404040" stroke-width="1"/>
</svg>
